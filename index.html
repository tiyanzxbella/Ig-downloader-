<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Downloader - Video & Gambar</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            padding: 30px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 10px;
        }

        .header p {
            color: #666;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 1rem;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .loading {
            text-align: center;
            padding: 40px;
            display: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }

        .result-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .download-options {
            margin-top: 25px;
            display: none;
        }

        .option-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 2px solid #e1e1e1;
            transition: all 0.3s;
        }

        .option-card:hover {
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .option-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .badge-video {
            background: #dc3545;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: normal;
        }

        .badge-image {
            background: #28a745;
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: normal;
        }

        .download-btn {
            display: inline-block;
            padding: 12px 24px;
            background: #007bff;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            margin: 10px 0;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
        }

        .download-btn:hover {
            background: #0056b3;
            transform: translateY(-2px);
        }

        .preview {
            margin-top: 15px;
            max-width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        .preview video, .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
        }

        .metadata {
            background: #f0f2f5;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
        }

        .metadata h4 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
        }

        .caption-text {
            font-size: 0.9rem;
            color: #333;
            line-height: 1.5;
            margin-bottom: 12px;
            word-break: break-word;
        }

        .stats {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            padding-top: 10px;
            border-top: 1px solid #ddd;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #555;
        }

        .examples {
            margin-top: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .example-link {
            display: inline-block;
            margin: 5px;
            padding: 8px 15px;
            background: #e1e1e1;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .example-link:hover {
            background: #667eea;
            color: white;
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            color: white;
            font-size: 0.85rem;
        }

        .debug {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 10px;
            padding: 15px;
            margin-top: 20px;
            font-size: 11px;
            display: none;
        }

        .debug pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div style="font-size: 3rem;">📸🎬</div>
                <h1>Instagram Downloader</h1>
                <p>Download Video (Dengan Audio) atau Gambar HD</p>
            </div>

            <div class="input-group">
                <label>🔗 URL Instagram</label>
                <input type="text" id="urlInput" placeholder="https://www.instagram.com/reel/xxxxx atau https://www.instagram.com/p/xxxxx">
            </div>

            <button id="downloadBtn">🔍 Proses URL</button>

            <div class="examples">
                <p>📌 Contoh URL (klik untuk coba):</p>
                <span class="example-link" data-url="https://www.instagram.com/reel/DAJhSNxSm8Q">🎬 Reel Video</span>
                <span class="example-link" data-url="https://www.instagram.com/p/DFLxAuvTjYb">📷 Post Gambar</span>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>🔍 Menganalisis konten Instagram...</p>
                <p style="font-size: 0.9rem; margin-top: 10px;">Mohon tunggu 3-5 detik</p>
            </div>

            <div class="error" id="error"></div>
            <div class="result-badge" id="resultBadge"></div>

            <div class="download-options" id="downloadOptions">
                <div id="optionsContainer"></div>
            </div>

            <div class="debug" id="debug">
                <details>
                    <summary style="color: #aaa; cursor: pointer;">🔧 Technical Info</summary>
                    <pre id="debugContent">Loading...</pre>
                </details>
            </div>
        </div>
        <div class="footer">
            <p>Instagram Downloader - Support Video & Gambar HD</p>
        </div>
    </div>

    <script>
        const API_CONFIG = {
            url: "https://api.termai.cc",
            key: "Bell409"
        };

        async function downloadInstagram(url) {
            const loading = document.getElementById('loading');
            const errorDiv = document.getElementById('error');
            const downloadOptions = document.getElementById('downloadOptions');
            const optionsContainer = document.getElementById('optionsContainer');
            const debug = document.getElementById('debug');
            const debugContent = document.getElementById('debugContent');
            const resultBadge = document.getElementById('resultBadge');
            
            loading.style.display = 'block';
            errorDiv.style.display = 'none';
            downloadOptions.style.display = 'none';
            debug.style.display = 'none';
            resultBadge.style.display = 'none';
            optionsContainer.innerHTML = '';
            
            try {
                const apiUrl = `${API_CONFIG.url}/api/downloader/instagram?url=${encodeURIComponent(url)}&key=${API_CONFIG.key}`;
                console.log('Requesting:', apiUrl);
                
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                console.log('Response:', data);
                
                debugContent.textContent = JSON.stringify(data, null, 2);
                debug.style.display = 'block';
                
                // Extract metadata
                const metadata = extractMetadata(data);
                
                // Extract URLs
                const allUrls = extractAllUrls(data);
                const videoUrls = [];
                const imageUrls = [];
                
                allUrls.forEach(item => {
                    const urlLower = item.url.toLowerCase();
                    if (urlLower.includes('.mp4') || item.type === 'video') {
                        if (!urlLower.includes('thumb')) {
                            videoUrls.push(item);
                        }
                    } else if (urlLower.includes('.jpg') || urlLower.includes('.jpeg') || urlLower.includes('.png')) {
                        if (!item.key?.includes('profile')) {
                            imageUrls.push(item);
                        }
                    }
                });
                
                const uniqueVideos = removeDuplicates(videoUrls, 'url');
                const uniqueImages = removeDuplicates(imageUrls, 'url');
                
                // Show result badge
                if (uniqueVideos.length > 0 || uniqueImages.length > 0) {
                    let text = '✅ Berhasil ditemukan ';
                    if (uniqueVideos.length > 0 && uniqueImages.length > 0) {
                        text += `${uniqueVideos.length} video dan ${uniqueImages.length} gambar`;
                    } else if (uniqueVideos.length > 0) {
                        text += `${uniqueVideos.length} video`;
                    } else {
                        text += `${uniqueImages.length} gambar`;
                    }
                    resultBadge.textContent = text;
                    resultBadge.style.display = 'block';
                }
                
                // Display videos
                if (uniqueVideos.length > 0) {
                    uniqueVideos.forEach(video => {
                        optionsContainer.innerHTML += createVideoCard(video, metadata);
                    });
                }
                
                // Display images
                if (uniqueImages.length > 0) {
                    uniqueImages.forEach(image => {
                        optionsContainer.innerHTML += createImageCard(image, metadata);
                    });
                }
                
                if (uniqueVideos.length > 0 || uniqueImages.length > 0) {
                    downloadOptions.style.display = 'block';
                } else {
                    resultBadge.style.display = 'block';
                    resultBadge.style.background = '#fff3cd';
                    resultBadge.style.color = '#856404';
                    resultBadge.textContent = '⚠️ Tidak ditemukan konten yang bisa di-download';
                }
                
            } catch (error) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = `❌ Error: ${error.message}<br><br>🔄 Coba refresh halaman atau coba URL lain`;
                debug.style.display = 'block';
            } finally {
                loading.style.display = 'none';
            }
        }
        
        function createVideoCard(video, metadata) {
            return `
                <div class="option-card">
                    <div class="option-title">
                        🎬 Download Video
                        <span class="badge-video">Dengan Audio</span>
                    </div>
                    <a href="${video.url}" class="download-btn" download="${getFileName(video.url, 'video')}" target="_blank">
                        ⬇️ Download Video (MP4)
                    </a>
                    <div class="preview">
                        <video controls width="100%">
                            <source src="${video.url}" type="video/mp4">
                        </video>
                    </div>
                    ${createMetadataHTML(metadata)}
                </div>
            `;
        }
        
        function createImageCard(image, metadata) {
            return `
                <div class="option-card">
                    <div class="option-title">
                        🖼️ Download Gambar
                        <span class="badge-image">Resolusi HD</span>
                    </div>
                    <a href="${image.url}" class="download-btn" download="${getFileName(image.url, 'image')}" target="_blank">
                        ⬇️ Download Gambar (HD)
                    </a>
                    <div class="preview">
                        <img src="${image.url}" alt="Preview" style="max-width: 100%;">
                    </div>
                    ${createMetadataHTML(metadata)}
                </div>
            `;
        }
        
        function createMetadataHTML(metadata) {
            return `
                <div class="metadata">
                    <h4>📝 Informasi Konten</h4>
                    <div class="caption-text">${escapeHtml(metadata.caption || 'Tidak ada caption')}</div>
                    <div class="stats">
                        <div class="stat-item">
                            <span>❤️</span>
                            <span>${metadata.likeCount || 'Tidak tersedia'}</span>
                            <span>suka</span>
                        </div>
                        <div class="stat-item">
                            <span>💬</span>
                            <span>${metadata.commentCount || 'Tidak tersedia'}</span>
                            <span>komentar</span>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function extractMetadata(data) {
            let caption = '';
            let likeCount = null;
            let commentCount = null;
            
            function deepSearch(obj) {
                if (!obj || typeof obj !== 'object') return;
                for (let key in obj) {
                    const value = obj[key];
                    const lowerKey = key.toLowerCase();
                    
                    if (!caption && (lowerKey === 'caption' || lowerKey === 'title' || lowerKey === 'text')) {
                        if (typeof value === 'string' && value.length > 0) caption = value;
                    }
                    
                    if (likeCount === null && (lowerKey.includes('like') || lowerKey === 'likes')) {
                        if (typeof value === 'number') likeCount = value;
                        else if (typeof value === 'string' && !isNaN(parseInt(value))) likeCount = parseInt(value);
                    }
                    
                    if (commentCount === null && (lowerKey.includes('comment') || lowerKey === 'comments')) {
                        if (typeof value === 'number') commentCount = value;
                        else if (typeof value === 'string' && !isNaN(parseInt(value))) commentCount = parseInt(value);
                    }
                    
                    if (typeof value === 'object') deepSearch(value);
                }
            }
            
            deepSearch(data);
            
            const formatNumber = (num) => num ? num.toLocaleString('id-ID') : null;
            
            return {
                caption: caption || 'Tidak ada caption',
                likeCount: formatNumber(likeCount),
                commentCount: formatNumber(commentCount)
            };
        }
        
        function extractAllUrls(obj, found = []) {
            if (!obj || typeof obj !== 'object') return found;
            for (let key in obj) {
                const value = obj[key];
                if (typeof value === 'string' && (value.startsWith('http://') || value.startsWith('https://'))) {
                    let type = 'unknown';
                    if (value.includes('.mp4')) type = 'video';
                    else if (value.includes('.jpg') || value.includes('.jpeg') || value.includes('.png')) type = 'image';
                    found.push({ url: value, key: key, type: type });
                } else if (typeof value === 'object') {
                    extractAllUrls(value, found);
                }
            }
            return found;
        }
        
        function removeDuplicates(arr, key) {
            const seen = new Set();
            return arr.filter(item => {
                if (seen.has(item[key])) return false;
                seen.add(item[key]);
                return true;
            });
        }
        
        function getFileName(url, type) {
            const timestamp = Date.now();
            if (type === 'video') return `instagram_video_${timestamp}.mp4`;
            if (url.includes('.jpg')) return `instagram_image_${timestamp}.jpg`;
            if (url.includes('.png')) return `instagram_image_${timestamp}.png`;
            return `instagram_image_${timestamp}.jpg`;
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Event listeners
        document.getElementById('downloadBtn').onclick = () => {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) {
                document.getElementById('error').innerHTML = '❌ Masukkan URL Instagram!';
                document.getElementById('error').style.display = 'block';
                setTimeout(() => document.getElementById('error').style.display = 'none', 3000);
                return;
            }
            downloadInstagram(url);
        };
        
        document.querySelectorAll('.example-link').forEach(link => {
            link.onclick = () => {
                document.getElementById('urlInput').value = link.dataset.url;
                downloadInstagram(link.dataset.url);
            };
        });
        
        document.getElementById('urlInput').onkeypress = (e) => {
            if (e.key === 'Enter') document.getElementById('downloadBtn').click();
        };
    </script>
</body>
</html>
